{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>400 - Bad Request | RiskMate ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      body { background: linear-gradient(135deg,#071126 0%,#0b1220 100%); color: #fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
      .card { background: rgba(255,255,255,0.03); border: none; max-width:720px; }
      .code { font-size:88px; font-weight:700; }
      .muted { color: rgba(255,255,255,0.85); }
    </style>
  </head>
  <body>
    <div class="card p-4 shadow">
      <div class="row g-3 align-items-center">
        <div class="col-auto text-center">
          <div class="code text-secondary">400</div>
        </div>
        <div class="col">
          <h3 class="mb-1">Bad Request</h3>
          <p class="muted">The request could not be understood by the server. Please check the request and try again.</p>
          <div class="mt-3">
            <a href="{% url 'dashboard' %}" class="btn btn-outline-light"><i class="fas fa-home me-1"></i> Back to dashboard</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
