{% extends 'base.html' %}
{% block content %}
  <div class="container mt-4">
    <h2>Notification Preferences</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'notification_test_send' %}" class="btn btn-secondary">Send Test Notification</a>
    </form>
    <p class="mt-3 text-muted">Note: administrators have extra settings available.</p>
  </div>
{% endblock %}
