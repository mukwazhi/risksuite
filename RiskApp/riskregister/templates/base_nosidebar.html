<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}RiskMate ERP{% endblock %}</title>

    <!-- Bootstrap 5.3 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
      /* Global admin font stack + sizing */
      :root{
          --admin-font-size:13px;
          --admin-input-vertical:6px;
          --admin-input-horizontal:8px;
      }

      html, body{
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
          font-size: var(--admin-font-size);
          line-height: 1.4;
          color: #222;
          background-color: #f8f9fa;
          height: 100%;
      }

      /* Headings follow admin weight */
      h1,h2,h3,h4,h5,h6{
          font-weight:600;
          line-height:1.25;
          margin-top:0.5rem;
          margin-bottom:0.5rem;
      }

      /* Inputs / selects / textareas sized to match Django admin */
      .form-control,
      .form-select {
          font-size: 13px;
          padding: var(--admin-input-vertical) var(--admin-input-horizontal);
          line-height: 1.4;
          border-radius: 2px;
          height: calc(1.6em + 2 * var(--admin-input-vertical));
      }

      textarea.form-control {
          height: auto;
          min-height: 96px;
          padding: 8px;
      }

      /* Small variants */
      .form-control-sm, .form-select-sm {
          font-size: 12px;
          padding: 4px 6px;
          height: calc(1.4em + 8px);
      }

      /* Buttons / cards / tables use same base size */
      .btn { font-size: 13px; padding: 6px 10px; border-radius: 4px; }
      .card, .table, .nav, .list-group-item { font-size: 13px; }

      /* Visual tweaks */
      .navbar-brand { font-size: 1.5rem; }
      .breadcrumb { font-size: 0.875rem; }
      .form-label { font-size: 0.9rem; margin-bottom:0.5rem; }
      .input-group-text { border-radius: 0.375rem 0 0 0.375rem; }
      .card { border-radius: 0.5rem; }
      .stat-card { transition: transform 0.2s; }
      .stat-card:hover { transform: translateY(-5px); }
    </style>
    
    {% block extra_styles %}{% endblock %}
  </head>
  <body>
    {% include 'includes/topnav.html' %}

    <div class="container-fluid mt-3">
        <div class="row">            
            <!-- Main Content (Full Width) -->
            <div class="col-12 px-4">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer mt-auto py-3 bg-primary text-white">
      <div class="container-fluid text-center">
        <span>© 2025 RiskMate ERP. All rights reserved.</span>
      </div>
    </footer>

    <!-- Bootstrap 5.3 JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
